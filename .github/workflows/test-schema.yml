name: Test Adapters Against Schema

on:
  push:
    branches: ["main"]
    paths:
      - "config/primer_schema_config.yaml"
      - "config/hsa/hsa_schema_config.yaml"
      - "config/hsa/hsa_adapters_config_sample.yaml"
      - "biocypher_metta/adapters/**"
      - "biocypher_metta/processors/**"
      - "test/test.py"
      - "test/test_unit.py"
      - "test/conftest.py"

  pull_request:
    branches: ["main"]
    paths:
      - "config/primer_schema_config.yaml"
      - "config/hsa/hsa_schema_config.yaml"
      - "config/hsa/hsa_adapters_config_sample.yaml"
      - "biocypher_metta/adapters/**"
      - "biocypher_metta/processors/**"
      - "test/test.py"
      - "test/test_unit.py"
      - "test/conftest.py"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache uv packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv sync

      - name: Run unit tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          uv run pytest test/test_unit.py -v -s

      - name: Run schema integration tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          uv run pytest test/test.py \
            --adapters-config=./config/hsa/hsa_adapters_config_sample.yaml \
            --primer-schema-config=./config/primer_schema_config.yaml \
            --species-schema-config=./config/hsa/hsa_schema_config.yaml \
            -v -s
