version: '3.8'

services:
  mork-biocypher:
    build: .
    container_name: mork-biocypher
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8027}:8027"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      # Persistent snapshot volume — graph state survives restarts
      - ./mork_persist:/app/persist
      - ./entrypoint.sh:/app/entrypoint.sh
    environment:
      - RUST_LOG=info
      - SNAPSHOT_DIR=/app/persist
      - SNAPSHOT_INTERVAL_SECONDS=${SNAPSHOT_INTERVAL_SECONDS:-300}
      - MORK_URL=http://127.0.0.1:8027
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8027/status/-"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
# Removed named volumes to favor host bind-mounts for synchronization

volumes:
  data:
  reports: