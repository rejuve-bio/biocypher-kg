name: MotifDiff
website: https://github.com/rezwanhosseini/MotifDiff
relationships:
  transcription factor to snp association:
    url: https://github.com/rezwanhosseini/MotifDiff
    input_label: tf_snp
    output_label: binding_affected_by
    description: >-
      holds between a HOCOMOCO motif and a SNP where the SNP causes a gain
      or loss of transcription factor binding affinity at that motif site
    source: motif
    target: snp
    properties:
      effect: str
      score: float
      motif_id: str
