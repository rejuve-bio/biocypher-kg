services:

  build:
    image: biocypher/base:1.2.0
    container_name: build
    volumes:
      - biocypher_neo4j_volume:/usr/app/data
      - .:/src/
    command:
      - /bin/bash
      - /src/scripts/build.sh

  import:
    image: neo4j:4.4-enterprise
    container_name: import
    environment:
      NEO4J_AUTH: none
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      FILL_DB_ON_STARTUP: "yes"
    volumes:
      - biocypher_neo4j_volume:/data
      - ./scripts/import.sh:/scripts/import.sh
    command:
      - /bin/bash
      - /scripts/import.sh
    depends_on:
      build:
        condition: service_completed_successfully

  deploy:
    image: neo4j:4.4-enterprise
    container_name: deploy
    volumes:
      - biocypher_neo4j_volume:/data
    environment:
      NEO4J_dbms_security_auth__enabled: "false"
      NEO4J_dbms_databases_default__to__read__only: "false"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    depends_on:
      import:
        condition: service_completed_successfully

  mork:
    build:
      context: ./biocypher-mork
    container_name: mork-biocypher
    volumes:
      # KG output data (MeTTa / paths files) — source of truth
      - ${MORK_DATA_DIR:-./output_human}:/app/data
      # Persistent snapshot volume — bind mount translates host WAL to container
      - ./mork_persist:/app/persist
      # Map the fixed entrypoint script
      - ./biocypher-mork/entrypoint.sh:/app/entrypoint.sh:ro
    ports:
      - "${MORK_HOST_PORT:-8027}:8027"
    environment:
      - RUST_LOG=info
      # Snapshot settings (can be overridden in .env or docker-variables.env)
      - SNAPSHOT_DIR=/app/persist
      - SNAPSHOT_INTERVAL_SECONDS=${SNAPSHOT_INTERVAL_SECONDS:-300}
      - MORK_URL=http://127.0.0.1:8027
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8027/status/-"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  biocypher_neo4j_volume:
